name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: universal
        type: choice
        options:
          - all
          - universal
          - split
          - arm64-v8a
          - armeabi-v7a
          - x86
          - x86_64
          - aab
      app_version:
        description: App version (optional, SemVer like 1.2.3)
        required: false
        type: string
      release_notes:
        description: Release notes (optional, supports multi-line)
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER: ${{ vars.EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER }}
      AMAP_ANDROID_API_KEY: ${{ secrets.AMAP_ANDROID_API_KEY }}
      EXPO_PUBLIC_AMAP_WEB_KEY: ${{ secrets.EXPO_PUBLIC_AMAP_WEB_KEY }}
      APP_VERSION: ${{ inputs.app_version }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve app version
        run: |
          set -euo pipefail
          if [ -n "${APP_VERSION}" ]; then
            resolved_version="${APP_VERSION}"
          else
            resolved_version=$(node -p "require('./package.json').version")
          fi
          echo "APP_VERSION=${resolved_version}" >> "$GITHUB_ENV"
          echo "Resolved APP_VERSION=${resolved_version}"

      - name: Validate version format
        if: env.APP_VERSION != ''
        run: |
          if ! echo "${APP_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid app_version: ${APP_VERSION}. Expected SemVer like 1.2.3"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate licenses
        run: npm run licenses:generate

      - name: Prepare .env
        run: |
          set -euo pipefail
          : > .env
          echo "EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER=${EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER:-amap}" >> .env
          echo "AMAP_ANDROID_API_KEY=${AMAP_ANDROID_API_KEY}" >> .env
          echo "EXPO_PUBLIC_AMAP_WEB_KEY=${EXPO_PUBLIC_AMAP_WEB_KEY}" >> .env
          if [ -n "${APP_VERSION}" ]; then
            echo "APP_VERSION=${APP_VERSION}" >> .env
          fi

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/app/release.keystore

      - name: Configure signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          cat >> android/app/build.gradle << 'GRADLE_SIGNING'

          // GitHub Actions signing config
          android.signingConfigs {
            release {
              storeFile file("release.keystore")
              storePassword System.getenv("ANDROID_STORE_PASSWORD")
              keyAlias System.getenv("ANDROID_KEY_ALIAS")
              keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          GRADLE_SIGNING

      # ========== Universal APK (全架构合一) ==========
      - name: Build universal APK
        if: inputs.build_type == 'universal' || inputs.build_type == 'all'
        run: |
          cd android
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --no-daemon

      # ========== Split APKs (按架构拆分) ==========
      - name: Build split APKs
        if: inputs.build_type == 'split' || inputs.build_type == 'all'
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.enableSeparateBuildPerCPUArchitecture=true \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Dorg.gradle.parallel=false \
            -Dorg.gradle.workers.max=2 \
            --no-daemon

      # ========== 单架构 APK ==========
      - name: Build arm64-v8a APK
        if: inputs.build_type == 'arm64-v8a'
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --no-daemon

      - name: Build armeabi-v7a APK
        if: inputs.build_type == 'armeabi-v7a'
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=armeabi-v7a \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --no-daemon

      - name: Build x86 APK
        if: inputs.build_type == 'x86'
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=x86 \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --no-daemon

      - name: Build x86_64 APK
        if: inputs.build_type == 'x86_64'
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=x86_64 \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --no-daemon

      # ========== AAB ==========
      - name: Build AAB
        if: inputs.build_type == 'aab' || inputs.build_type == 'all'
        run: |
          cd android
          ./gradlew bundleRelease \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --no-daemon

      # ========== 收集产物 ==========
      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          # APK 文件
          if [ -d android/app/build/outputs/apk/release ]; then
            find android/app/build/outputs/apk/release -name "*.apk" | while read -r f; do
              filename=$(basename "$f")
              # 从文件名判断架构
              if echo "$filename" | grep -q "arm64"; then
                suffix="arm64-v8a"
              elif echo "$filename" | grep -q "armeabi"; then
                suffix="armeabi-v7a"
              elif echo "$filename" | grep -q "x86_64"; then
                suffix="x86_64"
              elif echo "$filename" | grep -q "x86"; then
                suffix="x86"
              elif echo "$filename" | grep -q "universal"; then
                suffix="universal"
              else
                suffix="release"
              fi
              cp "$f" "dist/gowherer-${suffix}-v${APP_VERSION:-0.0.0}.apk"
            done
          fi

          # AAB 文件
          if [ -d android/app/build/outputs/bundle/release ]; then
            find android/app/build/outputs/bundle/release -name "*.aab" -exec \
              cp {} "dist/gowherer-v${APP_VERSION:-0.0.0}.aab" \;
          fi

          echo "=== 产物列表 ==="
          ls -lh dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gowherer-android-${{ github.run_number }}
          path: dist/*
          if-no-files-found: error

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="v${APP_VERSION:-0.0.0}"
          title="GoWherer v${APP_VERSION:-${{ github.run_number }}}"
          notes_file=$(mktemp)
          {
            echo "## Android Build"
            echo ""
            echo "- Build Type: ${{ inputs.build_type }}"
            echo "- App Version: ${APP_VERSION:-default}"
            echo "- Run: #${{ github.run_number }}"
            echo ""
            echo "### 产物"
            echo ""
            echo "| 文件 | 架构 |"
            echo "|------|------|"
            for f in dist/*; do
              name=$(basename "$f")
              size=$(du -h "$f" | cut -f1)
              echo "| \`${name}\` | ${size} |"
            done
            if [ -n "${{ inputs.release_notes }}" ]; then
              echo ""
              echo "### Release Notes"
              echo ""
              printf '%b\n' "${{ inputs.release_notes }}"
            fi
          } > "$notes_file"
          gh release create "$tag" --title "$title" --notes-file "$notes_file" || true
          rm -f "$notes_file"
          gh release upload "$tag" dist/* --clobber
