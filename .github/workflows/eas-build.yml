name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Build platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      app_version:
        description: App version (optional, SemVer like 1.2.3)
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID || secrets.EAS_PROJECT_ID }}
      EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER: ${{ vars.EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER }}
      EXPO_PUBLIC_AMAP_WEB_KEY: ${{ secrets.EXPO_PUBLIC_AMAP_WEB_KEY }}
      APP_VERSION: ${{ inputs.app_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate required secrets
        run: |
          if [ -z "${EAS_PROJECT_ID}" ]; then
            echo "Warning: EAS_PROJECT_ID is empty. Falling back to app.config.ts default projectId."
          fi

          if [ -n "${APP_VERSION}" ] && ! echo "${APP_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid app_version: ${APP_VERSION}. Expected SemVer format like 1.2.3"
            exit 1
          fi

          provider="${EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER:-amap}"
          if [ "${provider}" = "amap" ] && [ -z "${EXPO_PUBLIC_AMAP_WEB_KEY}" ]; then
            echo "Missing required secret for amap provider: EXPO_PUBLIC_AMAP_WEB_KEY"
            exit 1
          fi

      - name: Trigger EAS build
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --wait \
            --json > eas-build.json

      - name: Download build artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          jq -c 'if type=="array" then .[] else . end' eas-build.json | while read -r item; do
            platform=$(echo "$item" | jq -r '.platform // "unknown"')
            build_url=$(echo "$item" | jq -r '.artifacts.buildUrl // empty')
            if [ -z "$build_url" ]; then
              echo "No artifact URL for platform: $platform"
              continue
            fi

            ext="bin"
            if [ "$platform" = "android" ]; then
              if echo "$build_url" | grep -qiE '\.aab($|\?)'; then
                ext="aab"
              else
                ext="apk"
              fi
            elif [ "$platform" = "ios" ]; then
              ext="ipa"
            fi

            file_name="gowherer-${platform}-${{ inputs.profile }}-${{ github.run_number }}.${ext}"
            echo "Downloading $platform artifact -> dist/$file_name"
            curl -fL "$build_url" -o "dist/$file_name"
          done

          count=$(ls -1 dist | wc -l | tr -d ' ')
          if [ "$count" = "0" ]; then
            echo "No build artifacts downloaded."
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-${{ inputs.profile }}-${{ github.run_number }}
          path: dist/*
          if-no-files-found: error

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="eas-build-${{ inputs.profile }}-${{ github.run_number }}"
          title="EAS Build #${{ github.run_number }} (${{ inputs.profile }})"
          notes="Platform: ${{ inputs.platform }}\nProfile: ${{ inputs.profile }}\nApp Version: ${APP_VERSION:-default}"
          gh release create "$tag" --title "$title" --notes "$notes" || true
          gh release upload "$tag" dist/* --clobber
