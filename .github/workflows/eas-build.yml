name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Build platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      app_version:
        description: App version (optional, SemVer like 1.2.3)
        required: false
        type: string
      release_notes:
        description: Release notes (optional, supports multi-line)
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID || secrets.EAS_PROJECT_ID }}
      EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER: ${{ vars.EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER }}
      AMAP_ANDROID_API_KEY: ${{ secrets.AMAP_ANDROID_API_KEY }}
      EXPO_PUBLIC_AMAP_WEB_KEY: ${{ secrets.EXPO_PUBLIC_AMAP_WEB_KEY }}
      APP_VERSION: ${{ inputs.app_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Sync secrets to EAS project
        run: |
          set -euo pipefail

          if [ -n "${APP_VERSION}" ]; then
            eas secret:create \
              --scope project \
              --name APP_VERSION \
              --value "${APP_VERSION}" \
              --type string \
              --non-interactive \
              --force
          fi

          if [ -n "${AMAP_ANDROID_API_KEY}" ]; then
            eas secret:create \
              --scope project \
              --name AMAP_ANDROID_API_KEY \
              --value "${AMAP_ANDROID_API_KEY}" \
              --type string \
              --non-interactive \
              --force
          fi

          if [ -n "${EXPO_PUBLIC_AMAP_WEB_KEY}" ]; then
            eas secret:create \
              --scope project \
              --name EXPO_PUBLIC_AMAP_WEB_KEY \
              --value "${EXPO_PUBLIC_AMAP_WEB_KEY}" \
              --type string \
              --non-interactive \
              --force
          fi

          eas secret:create \
            --scope project \
            --name EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER \
            --value "${EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER:-amap}" \
            --type string \
            --non-interactive \
            --force

      - name: Validate required secrets
        run: |
          if [ -z "${EAS_PROJECT_ID}" ]; then
            echo "Warning: EAS_PROJECT_ID is empty. Falling back to app.config.ts default projectId."
          fi

          if [ -n "${APP_VERSION}" ] && ! echo "${APP_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid app_version: ${APP_VERSION}. Expected SemVer format like 1.2.3"
            exit 1
          fi

          if [ "${{ inputs.platform }}" != "ios" ] && [ -z "${AMAP_ANDROID_API_KEY}" ]; then
            echo "Missing required secret for Android build: AMAP_ANDROID_API_KEY"
            exit 1
          fi

          provider="${EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER:-amap}"
          if [ "${provider}" = "amap" ] && [ -z "${EXPO_PUBLIC_AMAP_WEB_KEY}" ]; then
            echo "Missing required secret for amap provider: EXPO_PUBLIC_AMAP_WEB_KEY"
            exit 1
          fi

      - name: Prepare build env
        run: |
          set -euo pipefail
          : > .env

          echo "EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER=${EXPO_PUBLIC_REVERSE_GEOCODE_PROVIDER:-amap}" >> .env
          echo "AMAP_ANDROID_API_KEY=${AMAP_ANDROID_API_KEY}" >> .env
          echo "EXPO_PUBLIC_AMAP_WEB_KEY=${EXPO_PUBLIC_AMAP_WEB_KEY}" >> .env

          if [ -n "${APP_VERSION}" ]; then
            echo "APP_VERSION=${APP_VERSION}" >> .env
            echo "Injected APP_VERSION into .env for cloud build: ${APP_VERSION}"
          else
            echo "APP_VERSION is empty. Keep default version from app.config.ts"
          fi

      - name: Verify resolved Expo version
        run: |
          set -euo pipefail
          resolved_version=$(npx expo config --type public --json | jq -r '.version')
          echo "Resolved expo.version before EAS build: ${resolved_version}"
          if [ -n "${APP_VERSION}" ] && [ "${resolved_version}" != "${APP_VERSION}" ]; then
            echo "Resolved version does not match APP_VERSION input."
            exit 1
          fi

      - name: Trigger EAS build
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --wait \
            --json > eas-build.json

      - name: Download build artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          jq -c 'if type=="array" then .[] else . end' eas-build.json | while read -r item; do
            platform=$(echo "$item" | jq -r '.platform // "unknown"')
            build_url=$(echo "$item" | jq -r '.artifacts.applicationArchiveUrl // .artifacts.buildUrl // empty')
            if [ -z "$build_url" ]; then
              echo "No artifact URL for platform: $platform"
              continue
            fi

            ext=""
            if [ "$platform" = "android" ]; then
              android_build_type=$(jq -r --arg profile "${{ inputs.profile }}" '.build[$profile].android.buildType // empty' eas.json 2>/dev/null || true)
              if [ "$android_build_type" = "app-bundle" ]; then
                ext="aab"
              else
                ext="apk"
              fi
            elif [ "$platform" = "ios" ]; then
              ext="ipa"
            else
              ext="bin"
            fi

            header_file=$(mktemp)
            tmp_file=$(mktemp)
            echo "Downloading $platform artifact from $build_url"
            curl -fL -D "$header_file" "$build_url" -o "$tmp_file"

            disposition_name=$(grep -i '^content-disposition:' "$header_file" | sed -E 's/.*filename\*=UTF-8\x27\x27([^;]+).*/\1/I; t; s/.*filename="?([^\";]+)"?.*/\1/I' | tail -n1 || true)
            disposition_name=$(printf "%s" "$disposition_name" | sed 's/%20/ /g' || true)

            if [ -n "$disposition_name" ]; then
              detected_ext="${disposition_name##*.}"
              if echo "$detected_ext" | grep -qiE '^(apk|aab|ipa)$'; then
                ext=$(echo "$detected_ext" | tr '[:upper:]' '[:lower:]')
              fi
            fi

            file_name="gowherer-${platform}-${{ inputs.profile }}-${{ github.run_number }}.${ext}"
            mv "$tmp_file" "dist/$file_name"
            rm -f "$header_file"
            echo "Saved $platform artifact -> dist/$file_name"
          done

          count=$(ls -1 dist | wc -l | tr -d ' ')
          if [ "$count" = "0" ]; then
            echo "No build artifacts downloaded."
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-${{ inputs.profile }}-${{ github.run_number }}
          path: dist/*
          if-no-files-found: error

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="eas-build-${{ inputs.profile }}-${{ github.run_number }}"
          title="EAS Build #${{ github.run_number }} (${{ inputs.profile }})"
          notes_file=$(mktemp)
          {
            echo "Platform: ${{ inputs.platform }}"
            echo "Profile: ${{ inputs.profile }}"
            echo "App Version: ${APP_VERSION:-default}"
            if [ -n "${{ inputs.release_notes }}" ]; then
              echo ""
              echo "Release Notes:"
              printf '%b\n' "${{ inputs.release_notes }}"
            fi
          } > "$notes_file"
          gh release create "$tag" --title "$title" --notes-file "$notes_file" || true
          rm -f "$notes_file"
          gh release upload "$tag" dist/* --clobber
